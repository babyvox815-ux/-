name: Build workout images v31

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_workout_assets_v31.py'
      - '.github/workflows/build-workout-images-v31.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Checkout site
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tools
        run: python -m pip install --disable-pip-version-check pillow

      - name: Generate individual images and site
        run: python source/scripts/build_workout_assets_v31.py site

      - name: Verify generated site
        run: |
          test -f site/assets-v31/build.json
          test -f site/assets-v31/hero.jpg
          test -f site/assets-v31/exercise-squat.jpg
          grep -q '실사 이미지 v31' site/index.html
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('site/assets-v31/build.json').read_text())
          assert data['status']=='ok'
          assert data['images']==31
          print(data)
          PY

      - name: Commit generated assets
        working-directory: site
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html final-v31.html assets-v31
          if git diff --cached --quiet; then
            echo 'No generated changes'
          else
            git commit -m 'Deploy verified individual workout images v31'
            git push origin gh-pages
          fi

# deployment trigger: 2026-07-15-v31
