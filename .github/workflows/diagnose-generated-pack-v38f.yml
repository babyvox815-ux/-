name: Diagnose generated workout image pack v38f

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/diagnose_generated_pack_v38f.py'
      - '.github/workflows/diagnose-generated-pack-v38f.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- assets-v37
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/diagnose_generated_pack_v38f.py
      - uses: actions/upload-artifact@v4
        with:
          name: generated-pack-v38f-diagnostic
          path: pack-v38f-output/
