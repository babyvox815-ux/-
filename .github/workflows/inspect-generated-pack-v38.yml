name: Inspect generated workout image pack v38

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets-v37/**'
      - 'scripts/inspect_generated_pack_v38.py'
      - '.github/workflows/inspect-generated-pack-v38.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pillow pillow-avif-plugin
      - run: python scripts/inspect_generated_pack_v38.py
      - uses: actions/upload-artifact@v4
        with:
          name: generated-pack-v38-preview
          path: pack-v38-output/
          if-no-files-found: error
