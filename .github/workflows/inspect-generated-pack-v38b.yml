name: Inspect generated workout image pack v38b

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/inspect_generated_pack_v38.py'
      - '.github/workflows/inspect-generated-pack-v38b.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Load generated image chunks from gh-pages
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- assets-v37
          ls -lh assets-v37
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pillow pillow-avif-plugin
      - name: Decode and inspect generated image
        run: python scripts/inspect_generated_pack_v38.py > pack-v38-output/run.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-pack-v38b-preview
          path: pack-v38-output/
          if-no-files-found: error
