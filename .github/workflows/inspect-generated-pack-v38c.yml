name: Inspect generated workout image pack v38c

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/inspect_generated_pack_v38.py'
      - '.github/workflows/inspect-generated-pack-v38c.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Load generated image chunks from gh-pages
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- assets-v37
          ls -lh assets-v37
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pillow pillow-avif-plugin
      - name: Decode and inspect generated image
        continue-on-error: true
        run: |
          mkdir -p pack-v38-output
          python scripts/inspect_generated_pack_v38.py > pack-v38-output/run.log 2>&1
          echo $? > pack-v38-output/exit-code.txt
      - name: List diagnostics
        if: always()
        run: |
          find pack-v38-output -maxdepth 1 -type f -printf '%f %s bytes\n' || true
          cat pack-v38-output/run.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-pack-v38c-preview
          path: pack-v38-output/
          if-no-files-found: error
