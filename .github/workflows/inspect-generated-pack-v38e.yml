name: Inspect generated workout image pack v38e

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/inspect_generated_pack_v38e.py'
      - '.github/workflows/inspect-generated-pack-v38e.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Load image chunks from gh-pages
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- assets-v37
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pillow pillow-avif-plugin
      - name: Decode and inspect
        continue-on-error: true
        run: |
          mkdir -p pack-v38e-output
          python scripts/inspect_generated_pack_v38e.py > pack-v38e-output/run.log 2>&1
          echo $? > pack-v38e-output/exit-code.txt
      - name: Print report
        if: always()
        run: |
          cat pack-v38e-output/run.log || true
          cat pack-v38e-output/image-report.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-pack-v38e-preview
          path: pack-v38e-output/
          if-no-files-found: error
