<style>
:root{--bg:#050505;--card:#111211;--line:#2b2d2b;--text:#eceeeb;--muted:#969a95;--green:#54e936}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}button,input{font:inherit}.app{width:min(460px,100%);min-height:100vh;margin:auto;background:#050505;padding-bottom:calc(38px + env(safe-area-inset-bottom))}.top,.workTop{display:flex;justify-content:space-between;align-items:flex-start;padding:calc(28px + env(safe-area-inset-top)) 24px 22px}.eyebrow{margin:0 0 12px;color:#b4b7b2;font-size:13px;font-weight:700}.top h1{font-size:46px;line-height:1.02;letter-spacing:-2.4px;margin:0}.day{font-size:30px;letter-spacing:-1.2px;margin:12px 0 0;color:#d5d7d4}.badge{display:inline-flex;margin-top:12px;padding:6px 10px;border:1px solid rgba(84,233,54,.45);border-radius:999px;background:rgba(84,233,54,.1);color:#78ef61;font-size:10px;font-weight:800}.badge.error{border-color:#8a302c;color:#ff8a80;background:#24100f}.datePick{position:relative;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:#151615;display:grid;place-items:center;overflow:hidden}.datePick:before{content:"";width:18px;height:17px;border:1.8px solid #c9cbc8;border-radius:4px;box-shadow:inset 0 5px 0 -3px #c9cbc8}.datePick input{position:absolute;inset:0;opacity:0}.hero{position:relative;min-height:640px;overflow:hidden;background:#0b0c0b}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 27%;display:block}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,5,.02),rgba(5,5,5,.13) 35%,rgba(5,5,5,.87) 76%,#050505)}.heroText{position:absolute;z-index:2;left:24px;right:24px;bottom:30px}.heroText h2{font-size:38px;line-height:1.14;letter-spacing:-1.8px;margin:0 0 30px}.stats{display:grid;grid-template-columns:1fr 1fr;margin-bottom:27px}.stats div{padding-right:22px}.stats div+div{padding-left:27px;border-left:1px solid rgba(255,255,255,.14)}.stats span{display:block;color:#a4a7a2;font-size:12px;margin-bottom:8px}.stats strong{font-size:31px;color:var(--green)}.mainBtn,.finishBtn{width:100%;height:64px;border:0;border-radius:22px;background:var(--green);color:#0b1209;font-size:20px;font-weight:850;display:flex;justify-content:center;align-items:center;gap:10px;box-shadow:0 14px 34px rgba(84,233,54,.18)}.mainBtn:disabled{opacity:.38;box-shadow:none}.section{padding:42px 19px 12px}.sectionHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.sectionHead h2{margin:0;font-size:25px;letter-spacing:-.8px}.sectionHead button{border:0;background:none;color:#8e918d}.parts{display:grid;grid-template-columns:1fr 1fr;gap:12px}.part{position:relative;aspect-ratio:1/1.05;border:1px solid var(--line);border-radius:22px;overflow:hidden;padding:0;background:var(--card);color:var(--text);text-align:left}.part img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.92) brightness(.8) contrast(1.05)}.part:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.01),rgba(0,0,0,.18) 52%,rgba(0,0,0,.94) 100%)}.partInfo{position:absolute;z-index:2;left:15px;right:15px;bottom:14px}.partInfo b{display:block;font-size:20px;margin-bottom:4px}.partInfo small{color:#a5a8a3}.check{position:absolute;z-index:3;right:12px;top:12px;width:25px;height:25px;border:1px solid #737773;border-radius:50%;background:rgba(0,0,0,.24)}.part.selected{border-color:var(--green);box-shadow:inset 0 0 0 1px var(--green)}.part.selected img{filter:saturate(1) brightness(.94) contrast(1.05)}.part.selected .check{background:var(--green);border-color:var(--green)}.part.selected .check:after{content:"✓";color:#071006;display:grid;place-items:center;height:100%;font-weight:900}.workTop{align-items:center;position:sticky;top:0;background:rgba(5,5,5,.94);backdrop-filter:blur(18px);z-index:10}.back{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#111;color:#d5d7d4;font-size:31px;line-height:1}.workTitle{text-align:center}.workTitle p{margin:0 0 4px;color:#aeb1ad;font-size:12px}.workTitle h2{margin:0;font-size:18px}.clock{min-width:78px;text-align:right;color:#c0c3be;font-size:13px;font-variant-numeric:tabular-nums}.progress{height:3px;background:#1a1c19}.progress i{display:block;height:100%;width:0;background:var(--green)}.exerciseList{padding:25px 18px 122px}.group{font-size:14px;color:#c7cac5;margin:26px 4px 12px;padding-left:10px;border-left:3px solid var(--green)}.exercise{display:grid;grid-template-columns:126px minmax(0,1fr);gap:16px;align-items:center;padding:13px 0;border-bottom:1px solid #202220}.exercise img{width:126px;aspect-ratio:1.58/1;object-fit:cover;border-radius:15px;display:block;filter:saturate(.98) brightness(.93) contrast(1.06)}.exercise h3{margin:1px 0 5px;font-size:18px}.exercise p{margin:0 0 10px;color:#90938f;font-size:13px}.sets{display:flex;gap:7px;flex-wrap:wrap}.set{width:39px;height:39px;border-radius:50%;border:1px solid #3b3e3a;background:#0d0e0d;color:#c7cac5}.set.done{border-color:var(--green);color:var(--green);box-shadow:0 0 0 1px var(--green) inset}.video{display:inline-flex;margin-top:10px;color:#c1c4bf;text-decoration:none;font-size:12px;border-bottom:1px solid #525650;padding-bottom:2px}.finishBtn{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(414px,calc(100% - 36px));z-index:20}.toast{position:fixed;left:50%;top:24px;transform:translate(-50%,-18px);opacity:0;background:#151715;border:1px solid #343733;border-radius:999px;padding:11px 16px;transition:.2s;z-index:50}.toast.show{opacity:1;transform:translate(-50%,0)}[hidden]{display:none!important}@media(max-width:390px){.top h1{font-size:42px}.day{font-size:28px}.exercise{grid-template-columns:112px minmax(0,1fr);gap:13px}.exercise img{width:112px}}@media(min-width:700px){body{padding:22px}.app{border:1px solid #202220;border-radius:34px;overflow:hidden}}
</style>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(a=>a.forEach(r=>r.unregister())).catch(()=>{})}if('caches'in window){caches.keys().then(a=>Promise.all(a.map(k=>caches.delete(k)))).catch(()=>{})}</script>

</head>
<body>
<main class="app">
<section id="home">
<header class="top"><div><p class="eyebrow">용호의 운동</p><h1 id="dateTitle">오늘</h1><p class="day" id="dayTitle"></p><span class="badge" id="badge">실사 이미지 확인 중</span></div><label class="datePick"><input id="dateInput" type="date" aria-label="날짜 선택"></label></header>
<section class="hero"><img id="heroImage" alt="스쿼트 운동 이미지"><div class="heroText"><p class="eyebrow">오늘 운동</p><h2 id="summary">운동 부위를 골라주세요</h2><div class="stats"><div><span>예상 운동시간</span><strong id="minutes">0분</strong></div><div><span>예상 세트</span><strong id="setTotal">0세트</strong></div></div><button class="mainBtn" id="start" disabled>운동 시작 <b>›</b></button></div></section>
<section class="section"><div class="sectionHead"><h2>운동 부위 선택</h2><button id="clear">전체 해제</button></div><div class="parts" id="parts"></div></section>
</section>
<section id="work" hidden><header class="workTop"><button class="back" id="back">‹</button><div class="workTitle"><p>오늘 운동</p><h2 id="focusTitle">운동</h2></div><div class="clock" id="clock">00:00:00</div></header><div class="progress"><i id="bar"></i></div><div class="exerciseList" id="exerciseList"></div><button class="finishBtn" id="finish">운동 완료</button></section>
</main><div class="toast" id="toast"></div>
<script>
(()=>{'use strict';
const DATA=[{id:'하체',items:[['스쿼트',4,'6–10회',8],['레그프레스',4,'10–15회',9],['레그 익스텐션',3,'12–15회',10],['레그 컬',3,'10–15회',11]]},{id:'어깨',items:[['숄더 프레스',4,'8–12회',12],['사이드 레터럴 레이즈',3,'12–20회',13],['리버스 펙덱',3,'12–20회',14]]},{id:'가슴',items:[['벤치프레스',4,'6–10회',15],['인클라인 프레스',3,'8–12회',16],['케이블 플라이',3,'12–15회',17]]},{id:'등',items:[['랫풀다운',4,'8–12회',18],['시티드 케이블 로우',4,'8–12회',19],['원암 덤벨 로우',3,'10–12회',20]]},{id:'이두',items:[['바벨컬',3,'8–12회',21],['해머컬',3,'10–15회',22]]},{id:'삼두',items:[['케이블 푸시다운',4,'10–15회',23],['오버헤드 익스텐션',3,'10–15회',23]]},{id:'복근',items:[['케이블 크런치',3,'12–15회',6],['행잉 니레이즈',3,'10–15회',6],['플랭크',3,'30–60초',6]]},{id:'유산소',items:[['트레드밀 걷기',1,'20–30분',7],['인터벌 러닝',1,'12–20분',7]]}];
const $=s=>document.querySelector(s),storeKey='용호운동-final-v29';let spriteTiles=[],timer=null,startAt=0;
const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
let state=(()=>{try{return JSON.parse(localStorage.getItem(storeKey)||'{}')}catch{return{}}})();state.date||=today();state.parts||=[];state.sets||={};
const save=()=>localStorage.setItem(storeKey,JSON.stringify(state));
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1400)}
function crop(img,index){const cols=4,rows=6,w=Math.floor(img.naturalWidth/cols),h=Math.floor(img.naturalHeight/rows),c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,(index%cols)*w,Math.floor(index/cols)*h,w,h,0,0,w,h);return c.toDataURL('image/jpeg',.9)}
function loadImages(){const badge=$('#badge'),hero=window.YGO_HERO||'',sprite=window.YGO_SPRITE||'';if(!hero||!sprite){badge.textContent='이미지 파일 연결 실패';badge.classList.add('error');return}$('#heroImage').src=hero;const im=new Image();im.onload=()=>{spriteTiles=Array.from({length:24},(_,i)=>crop(im,i));badge.textContent='실사 이미지 25장 사이트 적용 완료';badge.classList.remove('error');render()};im.onerror=()=>{badge.textContent='운동 이미지 로딩 실패';badge.classList.add('error')};im.src=sprite}
function render(){const d=new Date(state.date+'T12:00:00');$('#dateTitle').textContent=new Intl.DateTimeFormat('ko-KR',{month:'long',day:'numeric'}).format(d);$('#dayTitle').textContent=new Intl.DateTimeFormat('ko-KR',{weekday:'long'}).format(d)+(state.date===today()?' · 오늘':'');$('#dateInput').value=state.date;$('#parts').innerHTML=DATA.map((p,i)=>`<button class="part ${state.parts.includes(p.id)?'selected':''}" data-part="${p.id}"><span class="check"></span>${spriteTiles[i]?`<img src="${spriteTiles[i]}" alt="${p.id} 운동 부위">`:''}<span class="partInfo"><b>${p.id}</b><small>${p.items.length}개 운동</small></span></button>`).join('');const selected=DATA.filter(p=>state.parts.includes(p.id)),sets=selected.flatMap(p=>p.items).reduce((n,x)=>n+x[1],0);$('#summary').textContent=state.parts.length?state.parts.join(' · '):'운동 부위를 골라주세요';$('#setTotal').textContent=sets+'세트';$('#minutes').textContent=(sets?Math.max(25,Math.round(sets*3.5)):0)+'분';$('#start').disabled=!state.parts.length;drawWorkout()}
function drawWorkout(){const selected=DATA.filter(p=>state.parts.includes(p.id));$('#focusTitle').textContent=state.parts.join(' · ')||'운동';let total=0,done=0,html='';selected.forEach(p=>{html+=`<h3 class="group">${p.id}</h3>`;p.items.forEach((x,i)=>{total+=x[1];const key=p.id+'-'+i;for(let s=0;s<x[1];s++)if(state.sets[key+'-'+s])done++;html+=`<article class="exercise">${spriteTiles[x[3]]?`<img src="${spriteTiles[x[3]]}" alt="${x[0]}">`:''}<div><h3>${x[0]}</h3><p>${x[1]}세트 · ${x[2]}</p><div class="sets">${Array.from({length:x[1]},(_,s)=>`<button class="set ${state.sets[key+'-'+s]?'done':''}" data-set="${key+'-'+s}">${s+1}</button>`).join('')}</div><a class="video" target="_blank" rel="noopener" href="https://www.youtube.com/results?search_query=${encodeURIComponent(x[0]+' 자세 한국 헬스')}">영상 보기</a></div></article>`})});$('#exerciseList').innerHTML=html;$('#bar').style.width=(total?done/total*100:0)+'%'}
function openWork(){startAt=Date.now();$('#home').hidden=true;$('#work').hidden=false;drawWorkout();clearInterval(timer);timer=setInterval(()=>{const s=Math.floor((Date.now()-startAt)/1000);$('#clock').textContent=[Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>String(v).padStart(2,'0')).join(':')},1000);scrollTo(0,0)}
document.addEventListener('click',e=>{const p=e.target.closest('[data-part]');if(p){const id=p.dataset.part;state.parts=state.parts.includes(id)?state.parts.filter(x=>x!==id):[...state.parts,id];save();render();return}const s=e.target.closest('[data-set]');if(s){state.sets[s.dataset.set]=!state.sets[s.dataset.set];save();drawWorkout()}});$('#dateInput').onchange=e=>{state.date=e.target.value||today();save();render()};$('#clear').onclick=()=>{state.parts=[];state.sets={};save();render()};$('#start').onclick=openWork;$('#back').onclick=()=>{$('#work').hidden=true;$('#home').hidden=false;clearInterval(timer);render()};$('#finish').onclick=()=>{clearInterval(timer);toast('오늘 운동을 저장했어요');setTimeout(()=>{$('#work').hidden=true;$('#home').hidden=false;render();scrollTo(0,0)},500)};render();loadImages();
})();
</script>
</body>
</html>
