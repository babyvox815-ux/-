<!doctype html>
<html lang="ko">
<head>

<title>용호의 운동 · 실사 이미지 v32</title>
<style>
:root{--bg:#050505;--card:#111211;--line:#2b2d2b;--text:#eceeeb;--muted:#969a95;--green:#75e34d;--shadow:0 28px 90px rgba(0,0,0,.48)}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}.app{width:min(460px,100%);min-height:100vh;margin:auto;background:#050505;padding-bottom:calc(38px + env(safe-area-inset-bottom))}.top,.workTop{display:flex;justify-content:space-between;align-items:flex-start;padding:calc(28px + env(safe-area-inset-top)) 24px 22px}.eyebrow{margin:0 0 12px;color:#b4b7b2;font-size:13px;font-weight:700}.top h1{font-size:46px;line-height:1.02;letter-spacing:-2.4px;margin:0}.day{font-size:30px;letter-spacing:-1.2px;margin:12px 0 0;color:#d5d7d4}.badge{display:inline-flex;margin-top:12px;padding:6px 10px;border:1px solid rgba(117,227,77,.42);border-radius:999px;background:rgba(117,227,77,.09);color:#8ef16a;font-size:10px;font-weight:800}.badge.bad{border-color:#8f3730;background:#24110f;color:#ff9389}.datePick{position:relative;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:#151615;display:grid;place-items:center;overflow:hidden}.datePick:before{content:"";width:18px;height:17px;border:1.8px solid #c9cbc8;border-radius:4px;box-shadow:inset 0 5px 0 -3px #c9cbc8}.datePick input{position:absolute;inset:0;opacity:0}.hero{position:relative;aspect-ratio:23/32;min-height:640px;overflow:hidden;background:#070807}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center center;background:#050505}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,5,.02),rgba(5,5,5,.06) 34%,rgba(5,5,5,.68) 70%,#050505 100%)}.heroText{position:absolute;z-index:2;left:24px;right:24px;bottom:30px}.heroText h2{font-size:38px;line-height:1.14;letter-spacing:-1.8px;margin:0 0 30px}.stats{display:grid;grid-template-columns:1fr 1fr;margin-bottom:27px}.stats div{padding-right:22px}.stats div+div{padding-left:27px;border-left:1px solid rgba(255,255,255,.14)}.stats span{display:block;color:#a4a7a2;font-size:12px;margin-bottom:8px}.stats strong{font-size:31px;color:var(--green)}.mainBtn,.finishBtn{width:100%;height:64px;border:0;border-radius:22px;background:var(--green);color:#0b1209;font-size:20px;font-weight:850;display:flex;justify-content:center;align-items:center;gap:10px;box-shadow:0 14px 34px rgba(117,227,77,.18);cursor:pointer}.mainBtn:disabled{opacity:.38;box-shadow:none}.section{padding:42px 19px 12px}.sectionHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.sectionHead h2{margin:0;font-size:25px;letter-spacing:-.8px}.sectionHead button{border:0;background:none;color:#8e918d;padding:8px}.parts{display:grid;grid-template-columns:1fr 1fr;gap:12px}.part{position:relative;aspect-ratio:1/1.08;border:1px solid var(--line);border-radius:22px;overflow:hidden;padding:0;background:var(--card);color:var(--text);text-align:left;cursor:pointer}.photo{position:absolute;inset:0;background-repeat:no-repeat;background-color:#101110;filter:brightness(.84) saturate(.94)}.part:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.18) 48%,rgba(0,0,0,.94) 100%)}.partInfo{position:absolute;z-index:2;left:15px;right:15px;bottom:14px}.partInfo b{display:block;font-size:20px;margin-bottom:4px}.partInfo small{color:#a5a8a3}.check{position:absolute;z-index:3;right:12px;top:12px;width:25px;height:25px;border:1px solid #737773;border-radius:50%;background:rgba(0,0,0,.24)}.part.selected{border-color:var(--green);box-shadow:inset 0 0 0 1px var(--green)}.part.selected .photo{filter:brightness(.98) saturate(1)}.part.selected .check{background:var(--green);border-color:var(--green)}.part.selected .check:after{content:"✓";color:#071006;display:grid;place-items:center;height:100%;font-weight:900}.workTop{align-items:center;position:sticky;top:0;background:rgba(5,5,5,.94);backdrop-filter:blur(18px);z-index:10}.back{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#111;color:#d5d7d4;font-size:31px;line-height:1}.workTitle{text-align:center}.workTitle p{margin:0 0 4px;color:#aeb1ad;font-size:12px}.workTitle h2{margin:0;font-size:18px}.clock{min-width:78px;text-align:right;color:#c0c3be;font-size:13px;font-variant-numeric:tabular-nums}.progress{height:3px;background:#1a1c19}.progress i{display:block;height:100%;width:0;background:var(--green);transition:width .2s}.exerciseList{padding:25px 18px 122px}.group{font-size:14px;color:#c7cac5;margin:26px 4px 12px;padding-left:10px;border-left:3px solid var(--green)}.exercise{display:grid;grid-template-columns:126px minmax(0,1fr);gap:16px;align-items:center;padding:13px 0;border-bottom:1px solid #202220}.exercisePhoto{position:relative;width:126px;aspect-ratio:36/23;border-radius:15px;overflow:hidden;background:#101110}.exercisePhoto .photo{filter:brightness(.94) saturate(.96)}.exercise h3{margin:1px 0 5px;font-size:18px}.exercise p{margin:0 0 10px;color:#90938f;font-size:13px}.sets{display:flex;gap:7px;flex-wrap:wrap}.set{width:39px;height:39px;border-radius:50%;border:1px solid #3b3e3a;background:#0d0e0d;color:#c7cac5}.set.done{border-color:var(--green);color:var(--green);box-shadow:0 0 0 1px var(--green) inset}.video{display:inline-flex;margin-top:10px;color:#c1c4bf;text-decoration:none;font-size:12px;border-bottom:1px solid #525650;padding-bottom:2px}.finishBtn{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(414px,calc(100% - 36px));z-index:20}.rest{position:fixed;right:max(18px,calc((100vw - 460px)/2 + 18px));bottom:calc(94px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:20px;padding:13px 15px;border:1px solid #30332f;border-radius:19px;background:#111311;box-shadow:var(--shadow);z-index:30}.rest span{display:block;font-size:11px;color:#8d918b}.rest strong{display:block;color:var(--green);font-size:24px;font-variant-numeric:tabular-nums}.rest button{border:0;background:none;color:#c1c4bf}.toast{position:fixed;left:50%;top:24px;transform:translate(-50%,-18px);opacity:0;background:#151715;border:1px solid #343733;border-radius:999px;padding:11px 16px;transition:.2s;z-index:50}.toast.show{opacity:1;transform:translate(-50%,0)}[hidden]{display:none!important}@media(max-width:390px){.top h1{font-size:42px}.day{font-size:28px}.exercise{grid-template-columns:112px minmax(0,1fr);gap:13px}.exercisePhoto{width:112px}}@media(min-width:700px){body{padding:22px}.app{border:1px solid #202220;border-radius:34px;overflow:hidden}}
</style>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(a=>a.forEach(r=>r.unregister())).catch(()=>{})}if('caches'in window){caches.keys().then(a=>Promise.all(a.map(k=>caches.delete(k)))).catch(()=>{})}</script>

</head>
<body>
<main class="app"><section id="home"><header class="top"><div><p class="eyebrow">용호의 운동</p><h1 id="dateTitle">오늘</h1><p class="day" id="dayTitle"></p><span class="badge" id="imageBadge">실사 이미지 v32 연결 중</span></div><label class="datePick"><input id="dateInput" type="date" aria-label="날짜 선택"></label></header><section class="hero"><img id="heroImage" alt="스쿼트 운동 이미지"><div class="heroText"><p class="eyebrow">오늘 운동</p><h2 id="summary">운동 부위를 골라주세요</h2><div class="stats"><div><span>예상 운동시간</span><strong id="minutes">0분</strong></div><div><span>예상 세트</span><strong id="setTotal">0세트</strong></div></div><button class="mainBtn" id="start" disabled>운동 시작 <b>›</b></button></div></section><section class="section"><div class="sectionHead"><h2>운동 부위 선택</h2><button id="clear">전체 해제</button></div><div class="parts" id="parts"></div></section></section><section id="work" hidden><header class="workTop"><button class="back" id="back" aria-label="뒤로가기">‹</button><div class="workTitle"><p>오늘 운동</p><h2 id="focusTitle">운동</h2></div><div class="clock" id="clock">00:00:00</div></header><div class="progress"><i id="bar"></i></div><div class="exerciseList" id="exerciseList"></div><button class="finishBtn" id="finish">운동 완료</button></section></main><div class="rest" id="rest" hidden><div><span>휴식 시간</span><strong id="restTime">01:30</strong></div><button id="restSkip">건너뛰기</button></div><div class="toast" id="toast"></div>
<script>
(()=>{'use strict';
const $=s=>document.querySelector(s);let HERO_URL='',SPRITE_URL='',workoutTimer=null,restTimer=null,startAt=0;
const PARTS=[{id:'하체',count:4},{id:'어깨',count:3},{id:'가슴',count:3},{id:'등',count:3},{id:'이두',count:2},{id:'삼두',count:2},{id:'복근',count:3},{id:'유산소',count:2}];
const DATA={'하체':[['스쿼트',4,'6–10회',150,8],['레그프레스',4,'10–15회',120,9],['레그 익스텐션',3,'12–15회',75,10],['레그 컬',3,'10–15회',90,11]],'어깨':[['숄더 프레스',4,'8–12회',120,12],['사이드 레터럴 레이즈',3,'12–20회',60,13],['리버스 펙덱',3,'12–20회',60,14]],'가슴':[['벤치프레스',4,'6–10회',150,15],['인클라인 프레스',3,'8–12회',120,16],['케이블 플라이',3,'12–15회',75,17]],'등':[['랫풀다운',4,'8–12회',120,18],['시티드 케이블 로우',4,'8–12회',120,19],['원암 덤벨 로우',3,'10–12회',90,20]],'이두':[['바벨컬',3,'8–12회',90,21],['해머컬',3,'10–15회',75,22]],'삼두':[['케이블 푸시다운',4,'10–15회',75,23],['오버헤드 익스텐션',3,'10–15회',75,23]],'복근':[['케이블 크런치',3,'12–15회',60,6],['행잉 니레이즈',3,'10–15회',60,6],['플랭크',3,'30–60초',60,6]],'유산소':[['트레드밀 걷기',1,'20–30분',0,7],['인터벌 러닝',1,'12–20분',0,7]]};
const key='용호운동-v32',today=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
let state=(()=>{try{return JSON.parse(localStorage.getItem(key)||'null')}catch{return null}})()||{date:today(),parts:[],sets:{}};state.date||=today();state.parts||=[];state.sets||={};const save=()=>localStorage.setItem(key,JSON.stringify(state));
function blobURL(base64,type='image/jpeg'){const clean=(base64||'').replace(/\s/g,'');if(!clean)return'';const bytes=[];for(let i=0;i<clean.length;i+=32768){const binary=atob(clean.slice(i,i+32768));const block=new Uint8Array(binary.length);for(let j=0;j<binary.length;j++)block[j]=binary.charCodeAt(j);bytes.push(block)}return URL.createObjectURL(new Blob(bytes,{type}))}
function photoStyle(index,url=SPRITE_URL){const x=(index%4)*(100/3),y=Math.floor(index/4)*20;return`background-image:url('${url}');background-size:400% 600%;background-position:${x}% ${y}%`}
function fallbackStyle(){return`background-image:url('${HERO_URL}');background-size:cover;background-position:center center`}
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1400)}
const clock=s=>{s=Math.max(0,Math.floor(s));return[Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>String(v).padStart(2,'0')).join(':')};
function render(){const d=new Date(state.date+'T12:00:00');$('#dateTitle').textContent=new Intl.DateTimeFormat('ko-KR',{month:'long',day:'numeric'}).format(d);$('#dayTitle').textContent=new Intl.DateTimeFormat('ko-KR',{weekday:'long'}).format(d)+(state.date===today()?' · 오늘':'');$('#dateInput').value=state.date;$('#parts').innerHTML=PARTS.map((p,i)=>`<button class="part ${state.parts.includes(p.id)?'selected':''}" data-part="${p.id}"><span class="check"></span><span class="photo" style="${SPRITE_URL?photoStyle(i):fallbackStyle()}"></span><span class="partInfo"><b>${p.id}</b><small>${p.count}개 운동</small></span></button>`).join('');const chosen=state.parts.flatMap(id=>DATA[id]||[]),sets=chosen.reduce((n,x)=>n+x[1],0);$('#summary').textContent=state.parts.length?state.parts.join(' · '):'운동 부위를 골라주세요';$('#setTotal').textContent=sets+'세트';$('#minutes').textContent=(sets?Math.max(25,Math.round(sets*3.5)):0)+'분';$('#start').disabled=!state.parts.length;drawWorkout()}
function drawWorkout(){$('#focusTitle').textContent=state.parts.join(' · ')||'운동';let total=0,done=0,html='';state.parts.forEach(part=>{html+=`<h3 class="group">${part}</h3>`;(DATA[part]||[]).forEach((x,i)=>{total+=x[1];for(let s=0;s<x[1];s++)if(state.sets[`${part}-${i}-${s}`])done++;const style=SPRITE_URL?photoStyle(x[4]):fallbackStyle();html+=`<article class="exercise"><div class="exercisePhoto"><span class="photo" style="${style}"></span></div><div><h3>${x[0]}</h3><p>${x[1]}세트 · ${x[2]}</p><div class="sets">${Array.from({length:x[1]},(_,s)=>`<button class="set ${state.sets[`${part}-${i}-${s}`]?'done':''}" data-set="${part}-${i}-${s}" data-rest="${x[3]}">${s+1}</button>`).join('')}</div><a class="video" target="_blank" rel="noopener" href="https://www.youtube.com/results?search_query=${encodeURIComponent(x[0]+' 자세 한국 헬스')}">영상 보기</a></div></article>`})});$('#exerciseList').innerHTML=html;$('#bar').style.width=(total?done/total*100:0)+'%'}
function startRest(sec){if(!sec)return;clearInterval(restTimer);let left=sec;$('#rest').hidden=false;const tick=()=>{$('#restTime').textContent=clock(left).slice(3);if(left<=0){clearInterval(restTimer);$('#rest').hidden=true;toast('다음 세트를 시작하세요')}left--};tick();restTimer=setInterval(tick,1000)}
function initImages(){const badge=$('#imageBadge');try{HERO_URL=blobURL(window.__H);SPRITE_URL=blobURL(window.__S);if(!HERO_URL||!SPRITE_URL)throw new Error('이미지 조각 없음');const hero=$('#heroImage'),test=new Image();let heroOK=false,spriteOK=false;const finish=()=>{if(heroOK&&spriteOK){badge.textContent='실사 운동 이미지 정상 연결';badge.classList.remove('bad');render()}};hero.onload=()=>{heroOK=true;finish()};hero.onerror=()=>{badge.textContent='메인 이미지 로딩 실패';badge.classList.add('bad')};hero.src=HERO_URL;test.onload=()=>{spriteOK=true;finish()};test.onerror=()=>{SPRITE_URL='';badge.textContent='부위 이미지 오류 · 대체 이미지 적용';badge.classList.add('bad');render()};test.src=SPRITE_URL}catch(e){badge.textContent='이미지 복원 실패 · 대체 이미지 적용';badge.classList.add('bad');render()}}
function openWork(){startAt=Date.now();$('#home').hidden=true;$('#work').hidden=false;drawWorkout();clearInterval(workoutTimer);const tick=()=>$('#clock').textContent=clock((Date.now()-startAt)/1000);tick();workoutTimer=setInterval(tick,1000);scrollTo(0,0)}
document.addEventListener('click',e=>{const p=e.target.closest('[data-part]');if(p){const id=p.dataset.part;state.parts=state.parts.includes(id)?state.parts.filter(x=>x!==id):[...state.parts,id];save();render();return}const s=e.target.closest('[data-set]');if(s){const was=!!state.sets[s.dataset.set];state.sets[s.dataset.set]=!was;save();drawWorkout();if(!was)startRest(Number(s.dataset.rest))}});$('#dateInput').onchange=e=>{state.date=e.target.value||today();save();render()};$('#clear').onclick=()=>{state.parts=[];state.sets={};save();render()};$('#start').onclick=openWork;$('#back').onclick=()=>{$('#work').hidden=true;$('#home').hidden=false;clearInterval(workoutTimer);render()};$('#finish').onclick=()=>{clearInterval(workoutTimer);clearInterval(restTimer);$('#rest').hidden=true;toast('오늘 운동을 저장했어요');setTimeout(()=>{$('#work').hidden=true;$('#home').hidden=false;render();scrollTo(0,0)},500)};$('#restSkip').onclick=()=>{clearInterval(restTimer);$('#rest').hidden=true};render();initImages();
})();
</script>
</body></html>
