<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050505"><title>용호의 운동 v34</title><style>:root{--g:#79e450;--bg:#050505;--card:#101110;--line:#292c29;--txt:#eceeeb;--muted:#969a95}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif}button,input{font:inherit}.app{width:min(460px,100%);min-height:100vh;margin:auto;padding-bottom:40px;background:#050505}.top,.workTop{display:flex;justify-content:space-between;align-items:flex-start;padding:calc(28px + env(safe-area-inset-top)) 24px 22px}.top h1{font-size:46px;line-height:1;margin:0;letter-spacing:-2.5px}.day{font-size:29px;margin:14px 0 0;color:#d4d6d3}.eyebrow{font-size:13px;color:#b1b4af;margin:0 0 12px;font-weight:700}.badge{display:inline-flex;margin-top:12px;border:1px solid rgba(121,228,80,.45);background:rgba(121,228,80,.08);color:#92ef70;padding:6px 10px;border-radius:999px;font-size:10px;font-weight:800}.badge.bad{border-color:#94453e;background:#241412;color:#ff9c92}.date{position:relative;width:44px;height:44px;border:1px solid var(--line);border-radius:50%;background:#151615}.date:before{content:"";position:absolute;left:12px;top:13px;width:18px;height:16px;border:2px solid #c8cbc7;border-radius:4px;box-shadow:inset 0 5px 0 -3px #c8cbc7}.date input{position:absolute;inset:0;opacity:0}.hero{position:relative;min-height:640px;aspect-ratio:23/32;overflow:hidden}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 38%}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 25%,rgba(5,5,5,.18) 48%,rgba(5,5,5,.84) 76%,#050505)}.heroText{position:absolute;z-index:2;left:24px;right:24px;bottom:30px}.heroText h2{font-size:38px;line-height:1.13;margin:0 0 29px;letter-spacing:-1.8px}.stats{display:grid;grid-template-columns:1fr 1fr;margin-bottom:26px}.stats div+div{border-left:1px solid rgba(255,255,255,.14);padding-left:27px}.stats span{display:block;font-size:12px;color:#a1a49f;margin-bottom:7px}.stats strong{font-size:31px;color:var(--g)}.main,.finish{width:100%;height:64px;border:0;border-radius:22px;background:var(--g);color:#091107;font-size:20px;font-weight:850}.main:disabled{opacity:.38}.section{padding:42px 19px 10px}.sectionHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.sectionHead h2{font-size:25px;margin:0}.sectionHead button{border:0;background:none;color:#8f928e}.parts{display:grid;grid-template-columns:1fr 1fr;gap:12px}.part{position:relative;aspect-ratio:1/1.08;padding:0;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:var(--card);color:#fff;text-align:left}.photo{position:absolute;inset:0;background-repeat:no-repeat;background-color:#111;filter:brightness(.94) saturate(.98)}.part:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(0,0,0,.16) 54%,rgba(0,0,0,.92))}.info{position:absolute;z-index:2;left:15px;bottom:14px}.info b{display:block;font-size:20px;margin-bottom:4px}.info small{color:#a3a6a1}.check{position:absolute;z-index:3;right:12px;top:12px;width:25px;height:25px;border:1px solid #737773;border-radius:50%;background:rgba(0,0,0,.28)}.part.on{border-color:var(--g);box-shadow:inset 0 0 0 1px var(--g)}.part.on .check{background:var(--g);border-color:var(--g)}.part.on .check:after{content:"✓";display:grid;place-items:center;height:100%;color:#061005;font-weight:900}.workTop{position:sticky;top:0;align-items:center;background:rgba(5,5,5,.94);backdrop-filter:blur(18px);z-index:10}.back{width:42px;height:42px;border:1px solid var(--line);border-radius:50%;background:#111;color:#ddd;font-size:31px}.workTitle{text-align:center}.workTitle p{margin:0 0 4px;color:#aaa;font-size:12px}.workTitle h2{margin:0;font-size:18px}.clock{min-width:78px;text-align:right;font-size:13px;color:#c2c5c0}.bar{height:3px;background:#191b19}.bar i{display:block;height:100%;background:var(--g);width:0}.list{padding:24px 18px 122px}.group{font-size:14px;color:#c6c9c4;border-left:3px solid var(--g);padding-left:10px;margin:27px 4px 12px}.ex{display:grid;grid-template-columns:126px minmax(0,1fr);gap:16px;align-items:center;padding:13px 0;border-bottom:1px solid #202220}.thumb{position:relative;width:126px;aspect-ratio:36/23;border-radius:15px;overflow:hidden;background:#111}.ex h3{font-size:18px;margin:0 0 5px}.ex p{font-size:13px;color:#91948f;margin:0 0 10px}.sets{display:flex;gap:7px;flex-wrap:wrap}.set{width:39px;height:39px;border-radius:50%;border:1px solid #3c3f3b;background:#0d0e0d;color:#c8cbc6}.set.done{border-color:var(--g);color:var(--g);box-shadow:inset 0 0 0 1px var(--g)}.video{display:inline-block;margin-top:9px;color:#c0c3be;text-decoration:none;border-bottom:1px solid #50534f;font-size:12px}.finish{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));width:min(414px,calc(100% - 36px));z-index:20}.toast{position:fixed;top:24px;left:50%;transform:translate(-50%,-15px);opacity:0;transition:.2s;background:#151715;border:1px solid #353835;border-radius:999px;padding:11px 16px;z-index:30}.toast.show{opacity:1;transform:translate(-50%,0)}[hidden]{display:none!important}@media(max-width:390px){.top h1{font-size:42px}.ex{grid-template-columns:112px minmax(0,1fr);gap:13px}.thumb{width:112px}}</style><script>if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(x=>x.forEach(r=>r.unregister()))}if('caches'in window){caches.keys().then(x=>Promise.all(x.map(k=>caches.delete(k))))}</script><script src="./v31/h1.js?v=3402"></script><script src="./v31/h2.js?v=3402"></script><script src="./v31/s1.js?v=3402"></script><script src="./v31/s2.js?v=3402"></script><script src="./v31/s3.js?v=3402"></script><script src="./v31/s4.js?v=3402"></script></head><body><main class="app"><section id="home"><header class="top"><div><p class="eyebrow">용호의 운동</p><h1 id="dateTitle"></h1><p class="day" id="dayTitle"></p><span id="badge" class="badge">고화질 운동 이미지 확인 중</span></div><label class="date"><input id="dateInput" type="date"></label></header><section class="hero"><img id="hero" alt="스쿼트"><div class="heroText"><p class="eyebrow">오늘 운동</p><h2 id="summary">운동 부위를 골라주세요</h2><div class="stats"><div><span>예상 운동시간</span><strong id="minutes">0분</strong></div><div><span>예상 세트</span><strong id="totalSets">0세트</strong></div></div><button id="start" class="main" disabled>운동 시작 ›</button></div></section><section class="section"><div class="sectionHead"><h2>운동 부위 선택</h2><button id="clear">전체 해제</button></div><div id="parts" class="parts"></div></section></section><section id="work" hidden><header class="workTop"><button id="back" class="back">‹</button><div class="workTitle"><p>오늘 운동</p><h2 id="workTitle"></h2></div><div id="clock" class="clock">00:00:00</div></header><div class="bar"><i id="progress"></i></div><div id="list" class="list"></div><button id="finish" class="finish">운동 완료</button></section></main><div id="toast" class="toast"></div><script>(()=>{'use strict';const $=s=>document.querySelector(s),cols=4,rows=6;let heroURL='',spriteURL='',timer,startAt=0;const parts=[['하체',4,0],['어깨',3,1],['가슴',3,2],['등',3,3],['이두',2,4],['삼두',2,5],['복근',3,6],['유산소',2,7]],data={'하체':[['스쿼트',4,'6–10회',8],['레그프레스',4,'10–15회',9],['레그 익스텐션',3,'12–15회',10],['레그 컬',3,'10–15회',11]],'어깨':[['숄더 프레스',4,'8–12회',12],['사이드 레터럴 레이즈',3,'12–20회',13],['리버스 펙덱',3,'12–20회',3]],'가슴':[['벤치프레스',4,'6–10회',15],['인클라인 프레스',3,'8–12회',17],['케이블 플라이',3,'12–15회',2]],'등':[['랫풀다운',4,'8–12회',18],['시티드 케이블 로우',4,'8–12회',19],['원암 덤벨 로우',3,'10–12회',19]],'이두':[['바벨컬',3,'8–12회',20],['해머컬',3,'10–15회',21]],'삼두':[['케이블 푸시다운',4,'10–15회',23],['오버헤드 익스텐션',3,'10–15회',23]],'복근':[['케이블 크런치',3,'12–15회',6],['행잉 니레이즈',3,'10–15회',6],['플랭크',3,'30–60초',6]],'유산소':[['트레드밀 걷기',1,'20–30분',7],['인터벌 러닝',1,'12–20분',7]]},key='용호운동-v34';const today=()=>{const d=new Date;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};let st=(()=>{try{return JSON.parse(localStorage.getItem(key)||'null')}catch{return null}})()||{date:today(),parts:[],sets:{}};const save=()=>localStorage.setItem(key,JSON.stringify(st));function blob(s){const b=atob((s||'').replace(/\s/g,'')),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return URL.createObjectURL(new Blob([a],{type:'image/jpeg'}))}function pos(i){const c=i%cols,r=Math.floor(i/cols),x=c*100/(cols-1),y=r*100/(rows-1);return`background-image:url('${spriteURL}');background-size:400% 600%;background-position:${x}% ${y}%`}function show(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1300)}function render(){const d=new Date(st.date+'T12:00:00');$('#dateTitle').textContent=new Intl.DateTimeFormat('ko-KR',{month:'long',day:'numeric'}).format(d);$('#dayTitle').textContent=new Intl.DateTimeFormat('ko-KR',{weekday:'long'}).format(d)+(st.date===today()?' · 오늘':'');$('#dateInput').value=st.date;$('#parts').innerHTML=parts.map(p=>`<button class="part ${st.parts.includes(p[0])?'on':''}" data-part="${p[0]}"><span class="check"></span><span class="photo" style="${pos(p[2])}"></span><span class="info"><b>${p[0]}</b><small>${p[1]}개 운동</small></span></button>`).join('');const all=st.parts.flatMap(p=>data[p]||[]),sets=all.reduce((n,x)=>n+x[1],0);$('#summary').textContent=st.parts.length?st.parts.join(' · '):'운동 부위를 골라주세요';$('#totalSets').textContent=sets+'세트';$('#minutes').textContent=(sets?Math.max(25,Math.round(sets*3.5)):0)+'분';$('#start').disabled=!st.parts.length;draw()}function draw(){let html='',total=0,done=0;$('#workTitle').textContent=st.parts.join(' · ');st.parts.forEach(p=>{html+=`<h3 class="group">${p}</h3>`;(data[p]||[]).forEach((x,i)=>{total+=x[1];for(let s=0;s<x[1];s++)if(st.sets[`${p}-${i}-${s}`])done++;html+=`<article class="ex"><div class="thumb"><span class="photo" style="${pos(x[3])}"></span></div><div><h3>${x[0]}</h3><p>${x[1]}세트 · ${x[2]}</p><div class="sets">${Array.from({length:x[1]},(_,s)=>`<button class="set ${st.sets[`${p}-${i}-${s}`]?'done':''}" data-set="${p}-${i}-${s}">${s+1}</button>`).join('')}</div><a class="video" target="_blank" rel="noopener" href="https://www.youtube.com/results?search_query=${encodeURIComponent(x[0]+' 자세 한국 헬스')}">영상 보기</a></div></article>`})});$('#list').innerHTML=html;$('#progress').style.width=(total?done/total*100:0)+'%'}function init(){const badge=$('#badge');try{heroURL=blob(window.__H);spriteURL=blob(window.__S);const a=new Image,b=new Image;let ok=0;const done=()=>{if(++ok===2){badge.textContent='고화질 운동 이미지 정상 연결';render()}};a.onload=done;b.onload=done;a.onerror=b.onerror=()=>{badge.textContent='운동 이미지 로딩 실패';badge.classList.add('bad')};a.src=heroURL;b.src=spriteURL;$('#hero').src=heroURL}catch(e){badge.textContent='운동 이미지 복원 실패';badge.classList.add('bad')}}document.addEventListener('click',e=>{const p=e.target.closest('[data-part]');if(p){const id=p.dataset.part;st.parts=st.parts.includes(id)?st.parts.filter(x=>x!==id):[...st.parts,id];save();render()}const s=e.target.closest('[data-set]');if(s){st.sets[s.dataset.set]=!st.sets[s.dataset.set];save();draw()}});$('#dateInput').onchange=e=>{st.date=e.target.value||today();save();render()};$('#clear').onclick=()=>{st.parts=[];st.sets={};save();render()};$('#start').onclick=()=>{startAt=Date.now();$('#home').hidden=true;$('#work').hidden=false;draw();clearInterval(timer);timer=setInterval(()=>{let s=Math.floor((Date.now()-startAt)/1000);$('#clock').textContent=[Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>String(v).padStart(2,'0')).join(':')},1000);scrollTo(0,0)};$('#back').onclick=()=>{$('#work').hidden=true;$('#home').hidden=false;clearInterval(timer);render()};$('#finish').onclick=()=>{clearInterval(timer);show('오늘 운동을 저장했어요');setTimeout(()=>{$('#work').hidden=true;$('#home').hidden=false;render();scrollTo(0,0)},450)};st.date||=today();st.parts||=[];st.sets||={};init()})();</script></body></html>
