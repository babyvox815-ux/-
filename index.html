<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0c">
  <meta name="description" content="용호의 날짜별 운동 기록 앱">
  <title>용호의 운동</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=20">
</head>
<body>
  <div class="앱">
    <header class="상단">
      <div>
        <p class="작은글">용호의 운동</p>
        <h1 id="날짜제목">오늘</h1>
        <p id="요일제목" class="보조글"></p>
      </div>
      <button class="아이콘버튼" id="오늘버튼" aria-label="오늘로 이동"></button>
    </header>

    <main>
      <section class="날짜영역 카드">
        <button class="화살표" id="이전날" aria-label="이전 날짜"></button>
        <label class="날짜선택">
          <span>날짜 선택</span>
          <input id="날짜입력" type="date">
        </label>
        <button class="화살표" id="다음날" aria-label="다음 날짜"></button>
      </section>

      <section class="영웅 카드">
        <div class="영웅문구">
          <p class="작은글">오늘 운동</p>
          <h2 id="선택요약">운동 부위를 골라주세요</h2>
          <p id="예상요약" class="보조글">선택한 부위에 맞춰 운동이 자동으로 구성됩니다.</p>
          <button class="주버튼" id="운동시작">운동 시작</button>
        </div>
        <div class="영웅그림" aria-hidden="true">
          <svg viewBox="0 0 320 260" fill="none">
            <circle cx="160" cy="48" r="25" stroke="currentColor" stroke-width="5"/>
            <path d="M125 100c10-28 60-28 70 0l13 65-30 14-18-45-18 45-30-14 13-65Z" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
            <path d="M118 112 75 145M202 112l43 33M142 180l-12 58M178 180l12 58" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
            <path d="M48 145h54M218 145h54M62 132v26M258 132v26" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          </svg>
        </div>
      </section>

      <section class="구역" id="부위구역">
        <div class="구역제목">
          <div><p class="작은글">운동 선택</p><h2>오늘 할 부위</h2></div>
          <button class="글자버튼" id="전체해제">전체 해제</button>
        </div>
        <div class="부위목록" id="부위목록"></div>
      </section>

      <section class="집중화면" id="집중화면" hidden>
        <div class="집중상단 카드">
          <div>
            <p class="작은글">운동 중</p>
            <h2 id="집중제목">오늘 운동</h2>
            <p class="보조글"><span id="운동시간">00:00:00</span> · <span id="진행문구">0 / 0세트</span></p>
          </div>
          <button class="보조버튼" id="부위변경">부위 변경</button>
        </div>
        <div class="진행바"><i id="진행바"></i></div>
        <div class="운동목록" id="운동목록"></div>
        <button class="완료버튼" id="운동완료">오늘 운동 완료</button>
      </section>
    </main>
  </div>

  <div class="휴식창" id="휴식창" hidden>
    <div><span>휴식</span><strong id="휴식시간">01:30</strong></div>
    <button id="휴식중지">건너뛰기</button>
  </div>
  <div class="알림" id="알림"></div>
  <script src="./app.js?v=20" defer></script>
</body>
</html>
